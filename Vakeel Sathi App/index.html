<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vakeel Saathi – Your Legal AI Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f0e8; --bg2: #ede6d6;
    --surface: #fffdf7; --surface2: #f0ead8;
    --border: #c8b89a; --border2: #d4c4a8;
    --text: #2c1f0e; --text2: #5a4232; --text3: #8b6e50;
    --accent: #8b3a1a; --accent2: #b85c2e; --accent3: #d4860a;
    --gold: #c9960a; --gold2: #e8b020;
    --user-bubble: #2c1f0e; --user-text: #f5f0e8;
    --bot-bubble: #fffdf7; --bot-text: #2c1f0e;
    --shadow: rgba(44,31,14,0.15); --shadow2: rgba(44,31,14,0.06);
    --input-bg: #fffdf7; --scrollbar: #c8b89a;
    --tag-bg: #f0ead8; --tag-text: #8b3a1a; --tag-border: #c8b89a;
    --header-bg: rgba(245,240,232,0.96);
  }
  .dark {
    --bg: #0f0b07; --bg2: #1a1208;
    --surface: #1e1710; --surface2: #251c12;
    --border: #3d2e1a; --border2: #4a3820;
    --text: #f0e8d8; --text2: #c8b090; --text3: #907060;
    --accent: #d4622a; --accent2: #e8804a; --accent3: #f0a030;
    --gold: #d4a020; --gold2: #f0c040;
    --user-bubble: #d4622a; --user-text: #fff8f0;
    --bot-bubble: #1e1710; --bot-text: #f0e8d8;
    --shadow: rgba(0,0,0,0.45); --shadow2: rgba(0,0,0,0.2);
    --input-bg: #1e1710; --scrollbar: #3d2e1a;
    --tag-bg: #251c12; --tag-text: #d4622a; --tag-border: #3d2e1a;
    --header-bg: rgba(15,11,7,0.96);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'EB Garamond',serif;background:var(--bg);color:var(--text);
    height:100vh;display:flex;flex-direction:column;overflow:hidden;
    transition:background 0.4s,color 0.4s;}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(200,160,80,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%,rgba(139,58,26,0.05) 0%,transparent 60%);}

  header{position:relative;z-index:10;background:var(--header-bg);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:0 24px;height:68px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 20px var(--shadow2);transition:background 0.4s,border-color 0.4s;}
  .logo-area{display:flex;align-items:center;gap:14px;}
  .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:20px;box-shadow:0 4px 12px rgba(139,58,26,0.3);flex-shrink:0;}
  .logo-text h1{font-family:'Cinzel',serif;font-size:18px;font-weight:800;
    color:var(--accent);letter-spacing:1px;line-height:1;}
  .logo-text p{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;
    color:var(--text3);letter-spacing:0.5px;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .status-dot{display:flex;align-items:center;gap:6px;font-family:'Cormorant Garamond',serif;
    font-size:13px;color:var(--text3);}
  .dot{width:8px;height:8px;border-radius:50%;background:#4caf50;
    box-shadow:0 0 6px #4caf50;animation:pulse-dot 2s infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(1.3);}}
  .theme-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:all 0.3s;
    box-shadow:0 2px 8px var(--shadow2);}
  .theme-btn:hover{background:var(--surface2);transform:scale(1.05);}

  .main-layout{position:relative;z-index:1;display:flex;flex:1;overflow:hidden;}

  .sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;
    transition:background 0.4s,border-color 0.4s;}
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}
  .sidebar-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:2px;
    color:var(--text3);padding:0 16px 12px;text-transform:uppercase;}
  .cat-btn{display:block;width:100%;padding:9px 16px;background:transparent;border:none;
    text-align:left;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13.5px;
    color:var(--text2);transition:all 0.2s;border-left:3px solid transparent;line-height:1.3;}
  .cat-btn:hover{background:var(--surface2);color:var(--accent);border-left-color:var(--accent2);padding-left:20px;}
  .cat-btn.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent);font-weight:600;}

  .chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  .welcome-banner{padding:28px 32px 0;text-align:center;opacity:1;
    transition:opacity 0.5s,max-height 0.5s,padding 0.5s;max-height:300px;overflow:hidden;}
  .welcome-banner.hidden{opacity:0;max-height:0;padding:0;pointer-events:none;}
  .welcome-banner h2{font-family:'Playfair Display',serif;font-size:26px;font-style:italic;
    color:var(--accent);line-height:1.2;margin-bottom:8px;}
  .welcome-banner p{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text3);
    font-style:italic;margin-bottom:12px;}
  .divider{width:80px;height:2px;margin:0 auto 16px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);}

  .quick-prompts{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 14px;
    justify-content:center;transition:opacity 0.4s,max-height 0.4s,padding 0.4s;
    max-height:200px;overflow:hidden;}
  .quick-prompts.hidden{opacity:0;max-height:0;padding:0;pointer-events:none;}
  .qprompt{padding:7px 14px;background:var(--tag-bg);border:1px solid var(--tag-border);
    border-radius:20px;font-family:'Cormorant Garamond',serif;font-size:13px;
    color:var(--tag-text);cursor:pointer;transition:all 0.2s;}
  .qprompt:hover{background:var(--accent);color:#fff;border-color:var(--accent);
    transform:translateY(-2px);box-shadow:0 4px 12px var(--shadow);}

  .messages{flex:1;overflow-y:auto;padding:16px 24px;
    display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth;}
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px;}

  .message{display:flex;gap:12px;animation:msgIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .message.user{flex-direction:row-reverse;}

  .avatar{width:36px;height:36px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;}
  .avatar.bot{background:linear-gradient(135deg,var(--accent),var(--accent3));
    color:white;box-shadow:0 3px 10px rgba(139,58,26,0.3);}
  .avatar.user{background:var(--user-bubble);color:var(--user-text);
    font-family:'Cinzel',serif;font-size:11px;}

  .bubble-wrap{max-width:72%;display:flex;flex-direction:column;}
  .message.user .bubble-wrap{align-items:flex-end;}
  .sender-label{font-family:'Cinzel',serif;font-size:10px;font-weight:600;
    letter-spacing:1.5px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;}
  .bubble{padding:14px 18px;border-radius:16px;font-family:'EB Garamond',serif;
    font-size:15.5px;line-height:1.65;color:var(--bot-text);background:var(--bot-bubble);
    border:1px solid var(--border2);box-shadow:0 3px 14px var(--shadow2);}
  .message.user .bubble{background:var(--user-bubble);color:var(--user-text);
    border-color:transparent;box-shadow:0 4px 16px var(--shadow);}

  .law-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;margin:8px 0;transition:border-color 0.2s;}
  .law-card:hover{border-color:var(--accent2);}
  .law-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .tag-cat{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:1.5px;
    text-transform:uppercase;padding:3px 8px;background:var(--accent);color:white;border-radius:4px;}
  .tag-section{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--text3);}
  .tag-year{font-family:'EB Garamond',serif;font-size:11px;color:var(--text3);margin-left:auto;}
  .law-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;
    color:var(--accent);margin-bottom:4px;}
  .law-act{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
    color:var(--text3);margin-bottom:6px;}
  .law-keypoints{font-family:'EB Garamond',serif;font-size:14px;color:var(--text);
    line-height:1.55;margin-bottom:6px;}
  .law-penalty{display:flex;align-items:flex-start;gap:6px;padding:6px 10px;
    background:rgba(139,58,26,0.08);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;
    font-family:'EB Garamond',serif;font-size:13.5px;color:var(--text2);}
  .penalty-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

  .result-count{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
    color:var(--text3);margin-bottom:8px;}
  .no-result{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text3);font-size:15px;}
  .ornament{text-align:center;color:var(--gold);font-size:14px;letter-spacing:8px;margin:6px 0;opacity:0.6;}

  .show-more-btn{display:block;width:100%;padding:9px;margin-top:8px;
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text2);
    cursor:pointer;text-align:center;transition:all 0.2s;}
  .show-more-btn:hover{background:var(--accent);color:white;border-color:var(--accent);}

  .typing-indicator{display:flex;align-items:center;gap:5px;padding:4px 0;}
  .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);
    animation:typeBounce 1.2s infinite;}
  .typing-dot:nth-child(2){animation-delay:0.2s;}
  .typing-dot:nth-child(3){animation-delay:0.4s;}
  @keyframes typeBounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-7px);opacity:1;}}

  .intro-text{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text2);
    font-style:italic;margin-bottom:10px;line-height:1.6;}

  .input-area{padding:14px 24px 18px;background:var(--surface);border-top:1px solid var(--border);
    transition:background 0.4s,border-color 0.4s;}
  .input-row{display:flex;align-items:flex-end;gap:10px;background:var(--input-bg);
    border:1.5px solid var(--border);border-radius:16px;padding:10px 14px;
    box-shadow:0 4px 20px var(--shadow2);transition:border-color 0.3s,box-shadow 0.3s;}
  .input-row:focus-within{border-color:var(--accent2);box-shadow:0 4px 24px rgba(139,58,26,0.15);}
  #userInput{flex:1;background:transparent;border:none;outline:none;
    font-family:'EB Garamond',serif;font-size:16px;color:var(--text);
    resize:none;max-height:120px;min-height:24px;line-height:1.5;}
  #userInput::placeholder{color:var(--text3);font-style:italic;}
  .send-btn{width:40px;height:40px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:10px;color:white;cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    box-shadow:0 3px 10px rgba(139,58,26,0.3);}
  .send-btn:hover{transform:scale(1.08);box-shadow:0 5px 16px rgba(139,58,26,0.4);}
  .send-btn:active{transform:scale(0.96);}
  .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .input-footer{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 0;}
  .input-hint{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--text3);}
  .clear-btn{background:transparent;border:none;font-family:'Cormorant Garamond',serif;
    font-size:12px;color:var(--text3);cursor:pointer;transition:color 0.2s;}
  .clear-btn:hover{color:var(--accent);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px;}
  @media(max-width:700px){.sidebar{display:none;}.bubble-wrap{max-width:88%;}}

  .wiki-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    padding:5px 12px;background:transparent;
    border:1px solid var(--border);border-radius:6px;
    font-family:'Cormorant Garamond',serif;font-size:13px;
    color:var(--text3);text-decoration:none;transition:all 0.2s;}
  .wiki-link:hover{background:var(--accent);color:#fff;border-color:var(--accent);
    transform:translateX(2px);box-shadow:0 3px 10px var(--shadow);}
  .wiki-icon{display:inline-flex;align-items:center;justify-content:center;
    width:18px;height:18px;background:#e8e0d0;border-radius:3px;
    font-family:'Cinzel',serif;font-size:11px;font-weight:800;color:#2c1f0e;
    flex-shrink:0;transition:background 0.2s;}
  .wiki-link:hover .wiki-icon{background:rgba(255,255,255,0.25);color:#fff;}
  .dark .wiki-icon{background:#3d2e1a;color:var(--text);}
</style>
</head>

</div>

// ─── SEARCH LOGIC ────────────────────────────────
function searchLaws(query) {
  const q = query.toLowerCase().trim();
  const tokens = q.split(/\s+/).filter(t => t.length > 2);
  const stop = new Set(['the','and','is','are','what','tell','me','about','explain','give',
    'information','on','in','india','of','a','an','for','my','i','how','does','do','who',
    'which','section','act','law','laws','rights','rules','please','want','know']);
  const meaningful = tokens.filter(t => !stop.has(t));
  const searchTerms = meaningful.length > 0 ? meaningful : tokens;

  const scored = LAW_DATA.map(row => {
    const blob = [row.category, row.act, row.section, row.title, row.keyPoints, row.punishment]
      .join(' ').toLowerCase();
    let score = 0;
    if (blob.includes(q)) score += 30;
    const numMatch = q.match(/\b(\d{2,4}[a-z]?)\b/);
    if (numMatch && row.section.toLowerCase().includes(numMatch[1])) score += 25;
    searchTerms.forEach(term => {
      if (row.title.toLowerCase().includes(term)) score += 10;
      if (row.category.toLowerCase().includes(term)) score += 8;
      if (row.act.toLowerCase().includes(term)) score += 6;
      if (row.section.toLowerCase().includes(term)) score += 5;
      if (row.keyPoints.toLowerCase().includes(term)) score += 4;
      if (row.punishment.toLowerCase().includes(term)) score += 2;
    });
    return { row, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score);

  return scored.map(x => x.row);
}

// ─── ESCAPE HTML ─────────────────────────────────
function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── RENDER CARD ─────────────────────────────────
function wikiURL(law) {
  var query = law.title + ' ' + law.act + ' India';
  return 'https://en.wikipedia.org/wiki/Special:Search?search=' + encodeURIComponent(query);
}

function renderCard(law) {
  var penaltyHTML = (law.punishment && law.punishment !== '-' && law.punishment !== '\u2014')
    ? '<div class="law-penalty"><span class="penalty-icon">\u2696\uFE0F</span><span><strong>Penalty:</strong> ' + esc(law.punishment) + '</span></div>'
    : '';
  var wiki = wikiURL(law);
  return '<div class="law-card">'
    + '<div class="law-card-header">'
    + '<span class="tag-cat">' + esc(law.category) + '</span>'
    + '<span class="tag-section">' + esc(law.section) + '</span>'
    + '<span class="tag-year">' + esc(law.year) + '</span>'
    + '</div>'
    + '<div class="law-title">' + esc(law.title) + '</div>'
    + '<div class="law-act">\uD83D\uDCDC ' + esc(law.act) + '</div>'
    + '<div class="law-keypoints">' + esc(law.keyPoints) + '</div>'
    + penaltyHTML
    + '<a href="' + wiki + '" target="_blank" rel="noopener noreferrer" class="wiki-link">'
    + '<span class="wiki-icon">W</span> Read more on Wikipedia</a>'
    + '</div>';
}

  div.innerHTML = '<div class="avatar ' + avatarClass + '">' + avatarIcon + '</div>'

}

// ─── GENERATE RESPONSE ────────────────────────────
function generateResponse(query) {
  const results = searchLaws(query);

  if (results.length === 0) {
    return '<div class="intro-text">I searched through all 584 entries but could not find relevant provisions for your query.</div>'
      + '<div class="no-result">🔍 Try specific terms like <em>"IPC Section 302"</em>, <em>"dowry"</em>, <em>"bail"</em>, or browse categories from the sidebar.<br><br>'
      + '📚 You can also ask about: <em>Consumer rights, Family law, Property law, IT Act, Labour law, Constitutional rights</em> and more.</div>';
  }

  const topResults = results.slice(0, SHOW_INITIAL);
  const remaining = results.length - SHOW_INITIAL;

  let html = '<div class="result-count">✦ Found <strong>' + results.length + '</strong> relevant legal provision'
    + (results.length > 1 ? 's' : '') + ' · Showing top ' + topResults.length + '</div>';
  html += '<div class="ornament">✦ ✦ ✦</div>';
  topResults.forEach(function(law) { html += renderCard(law); });

  if (remaining > 0) {
    const allCards = results.slice(SHOW_INITIAL).map(renderCard).join('');
    html += '<div id="more-results-' + Date.now() + '" style="display:none">' + allCards + '</div>';
    const moreId = 'more-results-' + Date.now();
    html += '<button class="show-more-btn" onclick="'
      + 'var m=this.previousElementSibling;'
      + 'if(m.style.display===\'none\'){m.style.display=\'block\';this.textContent=\'▲ Show fewer\';}else{m.style.display=\'none\';this.textContent=\'▼ Show ' + remaining + ' more\';}'
      + '">▼ Show ' + remaining + ' more result' + (remaining > 1 ? 's' : '') + '</button>';
  }

  return html;
}

// ─── SEND MESSAGE ─────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query) return;

  hideWelcome();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', query, false);
  showTyping();

  await new Promise(function(r) { setTimeout(r, 600 + Math.random() * 500); });

  hideTyping();
  const responseHTML = generateResponse(query);
  addMessage('bot', responseHTML, true);
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  chatStarted = false;
  document.getElementById('welcomeBanner').classList.remove('hidden');
  document.getElementById('quickPrompts').classList.remove('hidden');
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
}
