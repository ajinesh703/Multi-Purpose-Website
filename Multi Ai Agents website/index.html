            --accent-secondary: #ff006e;
            --accent-tertiary: #ffbe0b;
            --text-primary: #e8e8ee;
            --text-secondary: #9999aa;
            --text-muted: #606070;
            --border-color: #2a2a35;
            --shadow: rgba(0, 212, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 110, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255, 190, 11, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 20s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            padding: 4rem 0 3rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: var(--text-secondary);
            font-weight: 400;
            font-style: italic;
            margin-bottom: 2rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-primary);
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Search and Filter */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Crimson Pro', serif;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out both;
            animation-delay: calc(var(--index) * 0.05s);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 60px var(--shadow);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-primary);
            flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .card-category {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-primary);
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .card-description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.7;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-primary);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .card-link:hover {
            gap: 1rem;
        }

        .card-link::after {
            content: '→';
            font-size: 1.2rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 0;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--accent-secondary);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-secondary);
        }

        .no-results {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Scroll to top */
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--accent-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

                grid-template-columns: 1fr;
            }

            .stats {
                gap: 1.5rem;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>

            { name: 'NiCE AI', category: 'customer', description: 'Customer service automation with AI', url: 'https://www.nice.com' },
            { name: 'SillyTavern', category: 'developer', description: 'Advanced open-source AI chat interface', url: 'https://github.com/SillyTavern/SillyTavern' },
            { name: 'Wit.ai', category: 'developer', description: 'Natural language processing for developers', url: 'https://wit.ai' },
            { name: 'OpenDialog', category: 'developer', description: 'Open-source conversation management', url: 'https://opendialog.ai' },
            { name: 'Botonic', category: 'developer', description: 'Open-source chatbot framework', url: 'https://botonic.io' },
            { name: 'Claudia Bot', category: 'developer', description: 'Serverless chatbot framework', url: 'https://claudiajs.com/claudia-bot-builder.html' },
            { name: 'Tock', category: 'developer', description: 'Open-source conversational AI toolkit', url: 'https://doc.tock.ai' },
            { name: 'BotMan', category: 'developer', description: 'PHP chatbot framework', url: 'https://botman.io' },
            { name: 'Bottender', category: 'developer', description: 'Chatbot framework for messaging platforms', url: 'https://bottender.js.org' },
            { name: 'DeepPavlov', category: 'developer', description: 'Open-source NLP framework', url: 'https://deeppavlov.ai' },
            { name: 'Golem', category: 'developer', description: 'Python chatbot framework', url: 'https://golem.ai' },
            { name: 'Deep AI', category: 'general', description: 'AI tools for image and text generation', url: 'https://deepai.org' },
            { name: 'Cleverbot', category: 'general', description: 'Long-running conversational AI', url: 'https://www.cleverbot.com' },
            { name: 'Mitsuku', category: 'general', description: 'Multiple award-winning chatbot', url: 'https://www.pandorabots.com/mitsuku' },
            { name: 'Rose AI', category: 'general', description: 'AI-powered data platform', url: 'https://rose.ai' },
            { name: 'Snatchbot', category: 'customer', description: 'Chatbot platform for businesses', url: 'https://snatchbot.me' },
            { name: 'Aivo', category: 'customer', description: 'Conversational AI for customer service', url: 'https://www.aivo.co' },
            { name: 'Rulai', category: 'enterprise', description: 'Enterprise AI chatbot platform', url: 'https://www.rul.ai' },
            { name: 'BotStar', category: 'customer', description: 'Visual chatbot builder', url: 'https://www.botstar.com' },
            { name: 'Morph.ai', category: 'customer', description: 'Chatbot platform for Messenger', url: 'https://morph.ai' }
        ];

        let filteredBots = [...chatbots];
        let currentCategory = 'all';

        function getInitials(name) {
            return name.split(' ').map(word => word[0]).join('').substring(0, 2).toUpperCase();
        }

        function renderChatbots() {
            const grid = document.getElementById('chatbotsGrid');
            grid.innerHTML = '';

            if (filteredBots.length === 0) {
                grid.innerHTML = '<div class="no-results">No chatbots found matching your criteria.</div>';
                return;
            }

            filteredBots.forEach((bot, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.setProperty('--index', index);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="logo">${getInitials(bot.name)}</div>
                        <h3 class="card-title">${bot.name}</h3>
                    </div>
                    <span class="card-category">${bot.category}</span>
                    <p class="card-description">${bot.description}</p>
                    <a href="${bot.url}" target="_blank" rel="noopener noreferrer" class="card-link">
                        Visit Website
                    </a>
                `;
                
                grid.appendChild(card);
            });

            document.getElementById('totalCount').textContent = filteredBots.length === chatbots.length ? '120+' : filteredBots.length;
        }

        function filterBots(searchTerm, category) {
            filteredBots = chatbots.filter(bot => {
                const matchesSearch = !searchTerm || 
                    bot.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    bot.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    bot.category.toLowerCase().includes(searchTerm.toLowerCase());
                
                const matchesCategory = category === 'all' || bot.category === category;
                
                return matchesSearch && matchesCategory;
            });
            
            renderChatbots();
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterBots(e.target.value, currentCategory);
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                const searchTerm = document.getElementById('searchInput').value;
                filterBots(searchTerm, currentCategory);
            });
        });

        // Scroll to top button
        const scrollTopBtn = document.getElementById('scrollTop');
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Initial render
        renderChatbots();
    </script>
</body>
</html>
